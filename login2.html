<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<h2>Admin Login</h2>
<form onsubmit="return adminLogin()">
<input type="text" id="adminuser" placeholder="Username"><br><br>
<input type="password" id="adminpass" placeholder="Password"><br><br>
<button type="submit">Login</button>
</form>

<script>function adminLogin(){
var user=document.getElementById("adminuser").value;
var pass=document.getElementById("adminpass").value;
if(user=="admin" && pass=="admin123"){
alert("Admin Login Successful");
window.location="welcomearti.html";
}
else{
alert("Invalid Admin Login");
}
return false;
}</script>
</body>
</html>
