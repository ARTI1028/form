<body>

<input type="password" id="guestpass" placeholder="Password"><br><br>
<button type="submit">Login</button>
</form>

<script>function guestLogin(){
var user=document.getElementById("guestuser").value;
var pass=document.getElementById("guestpass").value;
if(user=="guest" && pass=="guest123"){
alert("Guest Login Successful");
window.location="welcomeguest.html";
}
else if(user=="guest"){
alert("Wrong Password");
}
else{
alert("Invalid User");
}
return false;
}</script>
</body>
