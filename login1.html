<body>
<h2>Arti Login page</h2>
<form onsubmit="return artiLogin()">
<input type="text" id="artiuser" placeholder="Username"><br><br>
<input type="password" id="artipass" placeholder="Password"><br><br>
<button type="submit">Login</button>
</form>

<script>function artiLogin(){

var user=document.getElementById("artiuser").value;
var pass=document.getElementById("artipass").value;

if(user=="arti" && pass=="1234"){
alert("Arti Login Successful");
}
return false;
}</script>
</body>
